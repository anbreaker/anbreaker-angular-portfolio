<ng-container *transloco="let t">
  <footer class="footer" role="contentinfo">
    <div class="footer__container">
      <div class="footer__signature-wrap">
        <span
          class="footer__signature"
          appGradientTrack
          aria-label="Francisco Javier — rootdevs"
          [angleVar]="'--sig-angle'"
        >
          Francisco Javier
        </span>
        <a
          class="footer__logo-link"
          appTilt
          aria-label="Ir al inicio"
          routerLink="/"
          [appTiltIntensity]="10"
          [appTiltShine]="false"
        >
          <img class="footer__logo" alt="rootdevs logo" src="assets/images/logoRootdevs.webp" width="1001" height="371" loading="lazy" />
        </a>
      </div>

      <nav class="footer__social" aria-label="Social media links">
        @for (link of socialLinks; track link.platform) {
          <a
            class="footer__social-link"
            rel="noopener noreferrer"
            target="_blank"
            [attr.aria-label]="link.ariaLabel"
            [href]="link.url"
            [innerHTML]="safeIcon(link.icon)"
          ></a>
        }
      </nav>

      <p class="footer__copy">&copy; {{ currentYear }} Rootdevs | {{ t('footer.rights') }}</p>
    </div>
  </footer>
</ng-container>
