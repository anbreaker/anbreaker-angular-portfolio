<ng-container *transloco="let t">
  <section id="hero" class="hero" aria-labelledby="hero-heading">
    <div class="hero__bg" aria-hidden="true"></div>

    <div class="hero__container">
      <div class="hero__content">
        <p class="hero__tagline">{{ t('hero.tagline') }}</p>

        <h1 id="hero-heading" class="hero__title">
          <span class="hero__line"><span>Creative</span></span>
          <span class="hero__line">
            <span class="hero__serif"><em>Technologist</em></span>
          </span>
          <span class="hero__line">
            <span class="hero__grad">{{ t('hero.title') }}</span>
          </span>
        </h1>

        <p class="hero__subtitle">{{ t('hero.subtitle') }}</p>

        <div class="hero__actions">
          <button class="hero__cta hero__cta--primary" (click)="scrollToProjects()">
            {{ t('hero.ctaPortfolio') }}
          </button>
          <button class="hero__cta hero__cta--secondary" (click)="scrollToContact()">
            {{ t('hero.ctaContact') }}
          </button>
        </div>
      </div>

      <div class="hero__illustration" aria-hidden="true">
        <div class="hero__portrait-wrap">
          <div class="hero__portrait-glow hero__portrait-glow--cyan"></div>
          <div class="hero__portrait-glow hero__portrait-glow--rose"></div>
          <img
            class="hero__portrait"
            src="assets/images/image.png"
            alt="Francisco Javier — Creative Technologist & FullStack Master"
          />
        </div>
      </div>
    </div>

    <div
      class="hero__scroll-hint"
      aria-hidden="true"
      appGradientTrack
      [angleVar]="'--hint-angle'"
    >
      ↓ {{ t('hero.scroll') }}
    </div>
  </section>
</ng-container>
