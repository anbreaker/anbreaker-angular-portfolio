<ng-container *transloco="let t">
  <section id="hero" class="hero" aria-labelledby="hero-heading">
    <div class="hero__bg" aria-hidden="true"></div>

    <div class="hero__container">
      <div class="hero__content">
        <p class="hero__tagline">{{ t('hero.tagline') }}</p>

        <h1 id="hero-heading" class="hero__title">
          <span class="hero__line"><span>Creative</span></span>
          <span class="hero__line"><span class="hero__serif"><em>Technologist</em></span></span>
          <span class="hero__line"><span class="hero__grad">{{ t('hero.title') }}</span></span>
        </h1>

        <p class="hero__subtitle">{{ t('hero.subtitle') }}</p>

        <div class="hero__actions">
          <button class="hero__cta hero__cta--primary" (click)="scrollToProjects()">
            {{ t('hero.ctaPortfolio') }}
          </button>
          <button class="hero__cta hero__cta--secondary" (click)="scrollToContact()">
            {{ t('hero.ctaContact') }}
          </button>
        </div>
      </div>

      <div class="hero__illustration" aria-hidden="true">
        <div class="hero__portrait-wrap">
          <img
            class="hero__portrait"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJxEUuYy1uWNaWlPrlerAc7khWRN9Ug5p3J8sDuwzQg6WJqQJ2mA00GjjxIEIaN0Ei0XcJ8b6GZuHY31bBFg6bx7v_rBOhJymL3rFlnIoX8tjfucaewEMbWn-CL7v-jteEw55--_tM_dh6qvBqvvD-t5eYfZkGWPjPOOT69QIMWLxrqdmWXwQoTi96UdE8hKTMpjw97Scj_IG6epknBxe7M0L3eQNF0dUyFLYPaInjD_vfHryqhLr5b1sdbudFqPfJcZJYTrFFYS4"
            alt="Francisco Javier — Creative Technologist & FullStack Master"
            width="400"
            height="400"
          />
        </div>
      </div>
    </div>

    <div class="hero__scroll-hint" aria-hidden="true">↓ scroll</div>
  </section>
</ng-container>
