<ng-container *transloco="let t">
  <section id="tech" class="tech-stack" aria-labelledby="tech-heading">
    <div class="tech-stack__container">

      <div class="tech-stack__header">
        <p class="tech-stack__label">{{ t('techStack.label') }}</p>
        <h2 id="tech-heading" class="tech-stack__title">{{ t('techStack.title') }}</h2>
      </div>

      <div class="tech-stack__grid">
        @for (item of techItems; track item.id) {
          <app-neon-card [color]="item.glowColor">
            <div class="tech-stack__item">
              <div class="tech-stack__item-icon" aria-hidden="true">
                <img
                  [src]="item.iconUrl"
                  [alt]="item.name"
                  width="48"
                  height="48"
                  loading="lazy"
                  onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"
                />
                <span class="tech-stack__item-fallback" style="display:none">{{ item.name.charAt(0) }}</span>
              </div>
              <h3 class="tech-stack__item-name">{{ item.name }}</h3>
              <p class="tech-stack__item-desc">{{ item.description }}</p>
            </div>
          </app-neon-card>
        }
      </div>

    </div>
  </section>
</ng-container>
